<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PriceCheck v18.2</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  line-height: 1.4;
}

h2 { margin-bottom: 12px; }

/* 🧮 比價 */
.row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  align-items: center;
}

input {
  width: 110px;
  padding: 6px;
}

.result {
  margin-left: auto;
  font-weight: 600;
  min-width: 120px;
  text-align: right;
}

.best {
  background: #fff59d;
}

/* 🔘 工具列（只保留新增） */
.toolbar {
  margin-top: 10px;
  margin-bottom: 10px;
}

button {
  padding: 6px 10px;
  cursor: pointer;
  border: 1px solid #ccc;
  background: #f5f5f5;
  border-radius: 6px;
}

.save-btn {
  background: #e3f2fd;
}

/* 🔎 搜尋 */
.search-box {
  margin: 15px 0;
  display: flex;
  gap: 8px;
  align-items: center;
}

.search-box input {
  width: 260px;
  padding: 6px;
}

/* 📦 歷史 */
.history {
  margin-top: 20px;
  padding-top: 10px;
  border-top: 2px solid #ddd;
}

.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.card {
  border: 1px solid #eee;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  background: #fafafa;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.small {
  color: #888;
  font-size: 12px;
}

.del-btn {
  background: #ffebee;
  border: 1px solid #e57373;
  cursor: pointer;
  border-radius: 6px;
  padding: 4px 8px;
}

.danger-btn {
  background: #ffebee;
  border-color: #e57373;
}
</style>
</head>

<body>

<h2>🧮 PriceCheck</h2>

<div id="list"></div>

<!-- 🔘 工具列（只剩新增） -->
<div class="toolbar">
  <button onclick="addRow()">＋新增比價</button>
</div>

<!-- 🔎 搜尋 -->
<div class="search-box">
  🔎
  <input id="searchInput" placeholder="搜尋商品 / 規格..." oninput="renderHistory()">
</div>

<!-- 📦 歷史 -->
<div class="history">

  <div class="history-header">
    <b>📦 歷史紀錄</b>
    <button class="danger-btn" onclick="clearHistory()">🗑 清除全部</button>
  </div>

  <div id="historyList">尚無紀錄</div>
</div>

<script>

const STORAGE_KEY = "price_history_v17";
let history = loadHistory();

/* 初始化 */
for (let i = 0; i < 3; i++) addRow();
renderHistory();

function addRow() {
  let div = document.createElement("div");
  div.className = "row";

  div.innerHTML = `
    <input placeholder="商品">
    <input placeholder="規格">
    <input type="number" placeholder="總價">
    <input type="number" placeholder="數量">
    <div class="result">-</div>
    <button class="save-btn" onclick="saveRow(this)">💾</button>
  `;

  document.getElementById("list").appendChild(div);

  div.querySelectorAll("input").forEach(i => {
    i.addEventListener("input", updateAll);
  });
}

/* 比價 */
function updateAll() {
  let rows = document.querySelectorAll(".row");

  let min = Infinity;
  let minRow = null;

  rows.forEach(r => {
    let price = parseFloat(r.querySelectorAll("input")[2].value);
    let qty = parseFloat(r.querySelectorAll("input")[3].value);
    let res = r.querySelector(".result");

    if (!price || !qty || price <= 0 || qty <= 0) {
      res.innerText = "-";
      return;
    }

    let unit = price / qty;

    res.innerText = unit.toFixed(2);

    if (unit < min) {
      min = unit;
      minRow = r;
    }
  });

  rows.forEach(r => r.querySelector(".result").classList.remove("best"));
  if (minRow) minRow.querySelector(".result").classList.add("best");
}

/* 💾 儲存 */
function saveRow(btn) {
  let r = btn.parentElement;

  let name = r.querySelectorAll("input")[0].value.trim();
  let spec = r.querySelectorAll("input")[1].value.trim();
  let price = parseFloat(r.querySelectorAll("input")[2].value);
  let qty = parseFloat(r.querySelectorAll("input")[3].value);

  if (!price || !qty || price <= 0 || qty <= 0) return;

  let unit = price / qty;

  history.unshift({
    id: Date.now(),
    name: name || "未命名",
    spec: spec || "-",
    price,
    qty,
    unit: unit.toFixed(2),
    time: new Date().toLocaleString()
  });

  history = history.slice(0, 30);

  saveHistory();
  renderHistory();
}

/* 🔎 顯示 */
function renderHistory() {
  let box = document.getElementById("historyList");
  let keyword = document.getElementById("searchInput").value.toLowerCase();

  let filtered = history.filter(h =>
    h.name.toLowerCase().includes(keyword) ||
    h.spec.toLowerCase().includes(keyword)
  );

  if (filtered.length === 0) {
    box.innerHTML = "沒有符合紀錄";
    return;
  }

  box.innerHTML = filtered.map(h => `
    <div class="card">
      <div>
        📦 ${h.name} (${h.spec})<br>
        💰 ${h.price} / ${h.qty} = ${h.unit}<br>
        <span class="small">${h.time}</span>
      </div>

      <button class="del-btn" onclick="deleteOne(${h.id})">🗑</button>
    </div>
  `).join("");
}

/* 🗑 單筆刪除 */
function deleteOne(id) {
  history = history.filter(h => h.id !== id);
  saveHistory();
  renderHistory();
}

/* 🗑 全部清除 */
function clearHistory() {
  if (!confirm("確定清除全部？")) return;
  history = [];
  localStorage.removeItem(STORAGE_KEY);
  renderHistory();
}

/* 💾 存 */
function saveHistory() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

/* 📥 讀 */
function loadHistory() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
}

</script>

</body>
</html>
